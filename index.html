<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S — Neural Network</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080b12; font-family: 'Segoe UI', system-ui, sans-serif; color: #fff; overflow: hidden; height: 100vh; }

  #canvas-wrap { position: relative; width: 100vw; height: 100vh; }
  canvas { display: block; width: 100%; height: 100%; }

  #hud-top {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 18px 24px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none;
  }
  #logo {
    font-family: monospace;
    font-size: 11px;
    color: rgba(100,200,255,0.5);
    letter-spacing: 0.18em;
    line-height: 1.8;
  }
  #logo strong { color: rgba(140,220,255,0.85); font-size: 13px; display: block; letter-spacing: 0.22em; }

  #stats {
    font-family: monospace;
    font-size: 10px;
    color: rgba(100,200,255,0.45);
    text-align: right;
    line-height: 2;
  }

  #hud-bottom {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 20px 24px 28px;
    background: linear-gradient(transparent, rgba(8,11,18,0.95));
    display: flex; justify-content: space-between; align-items: flex-end;
    gap: 16px;
  }

  #tagline { line-height: 1.3; }
  #tagline h1 { font-size: 22px; font-weight: 500; color: #fff; text-shadow: 0 0 40px rgba(80,160,255,0.5); }
  #tagline p  { font-size: 11px; color: rgba(100,200,255,0.5); margin-top: 4px; font-family: monospace; letter-spacing: 0.1em; text-transform: uppercase; }

  #controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

  .btn {
    background: rgba(30,80,180,0.15);
    border: 0.5px solid rgba(80,160,255,0.3);
    color: rgba(140,210,255,0.85);
    font-family: monospace;
    font-size: 10px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .btn:hover { background: rgba(40,100,220,0.3); border-color: rgba(100,180,255,0.6); }
  .btn.active { background: rgba(60,130,255,0.28); border-color: rgba(120,200,255,0.85); color: #fff; }
  .btn.add-btn {
    background: rgba(30,160,100,0.18);
    border-color: rgba(30,200,120,0.4);
    color: rgba(100,230,160,0.9);
  }
  .btn.add-btn:hover { background: rgba(30,160,100,0.35); border-color: rgba(60,220,140,0.7); }

  #modal-bg {
    display: none;
    position: absolute; inset: 0;
    background: rgba(5,8,18,0.82);
    align-items: center; justify-content: center;
    z-index: 100;
  }
  #modal-bg.open { display: flex; }

  #modal {
    background: #0e1624;
    border: 0.5px solid rgba(80,160,255,0.35);
    border-radius: 14px;
    padding: 28px;
    width: 360px;
    max-width: 90vw;
  }
  #modal h2 { font-size: 14px; font-weight: 500; color: rgba(140,210,255,0.9); margin-bottom: 20px; letter-spacing: 0.06em; font-family: monospace; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: rgba(100,180,255,0.6); margin-bottom: 5px; font-family: monospace; letter-spacing: 0.08em; }
  .field input, .field select {
    width: 100%;
    background: rgba(20,40,80,0.5);
    border: 0.5px solid rgba(80,160,255,0.25);
    border-radius: 8px;
    color: rgba(200,230,255,0.9);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    font-family: monospace;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: rgba(80,160,255,0.6); }
  .field select option { background: #0e1624; }

  .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
  .modal-actions button {
    flex: 1; padding: 9px; border-radius: 8px; font-size: 12px;
    cursor: pointer; font-family: monospace; letter-spacing: 0.06em; border: 0.5px solid;
    transition: all 0.2s;
  }
  #btn-save { background: rgba(40,120,220,0.3); border-color: rgba(80,160,255,0.5); color: rgba(160,220,255,0.9); }
  #btn-save:hover { background: rgba(40,120,220,0.5); }
  #btn-cancel { background: transparent; border-color: rgba(80,100,140,0.4); color: rgba(140,160,200,0.7); }
  #btn-cancel:hover { background: rgba(40,60,100,0.3); }

  #node-info {
    position: absolute;
    background: rgba(10,18,35,0.95);
    border: 0.5px solid rgba(80,160,255,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: monospace;
    font-size: 11px;
    color: rgba(160,220,255,0.85);
    pointer-events: none;
    display: none;
    max-width: 180px;
    line-height: 1.6;
    z-index: 50;
  }
  #node-info strong { display: block; color: #fff; font-size: 12px; margin-bottom: 2px; }
  #node-info span { color: rgba(100,180,255,0.6); font-size: 10px; }

  #toast {
    position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(20,160,90,0.25); border: 0.5px solid rgba(40,200,120,0.4);
    color: rgba(100,230,160,0.9); font-family: monospace; font-size: 11px;
    padding: 8px 20px; border-radius: 20px; letter-spacing: 0.08em;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  #legend {
    position: absolute; top: 80px; right: 24px;
    font-family: monospace; font-size: 10px;
    color: rgba(100,180,255,0.45);
    line-height: 2.2;
    pointer-events: none;
  }
  .leg { display: flex; align-items: center; gap: 7px; }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<div id="canvas-wrap">
  <canvas id="net"></canvas>

  <div id="hud-top">
    <div id="logo">
      <strong>J.A.R.V.I.S</strong>
      NEURAL NETWORK // v2.1<br>
      JUST A RATHER VERY INTELLIGENT SYSTEM
    </div>
    <div id="stats">
      <div id="s-nodes">NODES: —</div>
      <div id="s-conn">LINKS: —</div>
      <div id="s-mode">MODO: TODOS</div>
      <div id="s-time">00:00:00</div>
    </div>
  </div>

  <div id="legend">
    <div class="leg"><div class="leg-dot" style="background:#1ec77a"></div>Inteligencia global</div>
    <div class="leg"><div class="leg-dot" style="background:#f0a020"></div>Mercados financieros</div>
    <div class="leg"><div class="leg-dot" style="background:#4a9eff"></div>Comunicación</div>
    <div class="leg"><div class="leg-dot" style="background:#c084fc"></div>Hub central</div>
    <div class="leg"><div class="leg-dot" style="background:#f06090"></div>Otros</div>
  </div>

  <div id="hud-bottom">
    <div id="tagline">
      <h1>Tu ecosistema,<br>conectado.</h1>
      <p>Sistema de inteligencia // en línea</p>
    </div>
    <div id="controls">
      <button class="btn active" onclick="setMode('all',this)">Todos</button>
      <button class="btn" onclick="setMode('intel',this)">Inteligencia</button>
      <button class="btn" onclick="setMode('finance',this)">Mercados</button>
      <button class="btn" onclick="setMode('comms',this)">Comunicación</button>
      <button class="btn" onclick="setMode('other',this)">Otros</button>
      <button class="btn add-btn" onclick="openModal()">+ Agregar nodo</button>
      <button class="btn" onclick="resetNodes()" style="border-color:rgba(255,80,80,0.3);color:rgba(255,130,130,0.7)">Reset</button>
    </div>
  </div>

  <div id="node-info"><strong id="ni-name"></strong><span id="ni-cat"></span></div>
  <div id="toast">Nodo guardado correctamente</div>
</div>

<div id="modal-bg">
  <div id="modal">
    <h2>// AGREGAR NODO</h2>
    <div class="field">
      <label>NOMBRE / APP</label>
      <input id="f-name" type="text" placeholder="Ej: Notion, Twitter, etc." />
    </div>
    <div class="field">
      <label>URL (opcional)</label>
      <input id="f-url" type="text" placeholder="https://..." />
    </div>
    <div class="field">
      <label>CATEGORÍA</label>
      <select id="f-cat">
        <option value="intel">Inteligencia global</option>
        <option value="finance">Mercados financieros</option>
        <option value="comms">Comunicación</option>
        <option value="other">Otros</option>
      </select>
    </div>
    <div class="field">
      <label>CONECTAR CON</label>
      <select id="f-conn">
        <option value="hub">Hub central</option>
      </select>
    </div>
    <div class="modal-actions">
      <button id="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button id="btn-save" onclick="saveNode()">Guardar nodo</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('net');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const CATS = {
  hub:     { color: '#c084fc', label: 'Hub central' },
  intel:   { color: '#1ec77a', label: 'Inteligencia global' },
  finance: { color: '#f0a020', label: 'Mercados financieros' },
  comms:   { color: '#4a9eff', label: 'Comunicación' },
  other:   { color: '#f06090', label: 'Otros' },
};

const DEFAULT_NODES = [
  { id: 'hub',   label: 'Panel de control', url: '',                           cat: 'hub',     r: 18, fixed: true },
  { id: 'wm',    label: 'World Monitor',    url: 'https://worldmonitor.app',   cat: 'intel',   r: 11, fixed: false },
  { id: 'og',    label: 'OpenGridWorks',    url: 'https://opengridworks.com',  cat: 'intel',   r: 10, fixed: false },
  { id: 'fv',    label: 'Finviz',           url: 'https://finviz.com',         cat: 'finance', r: 12, fixed: false },
  { id: 'wa',    label: 'WhatsApp Web',     url: 'https://web.whatsapp.com',   cat: 'comms',   r: 10, fixed: false },
  { id: 'ig',    label: 'Simon Clut IG',    url: 'https://instagram.com/simonclut', cat: 'comms', r: 9, fixed: false },
  { id: 'clima',   label: 'Google Clima', url: 'https://google.com/search?q=clima',  cat: 'intel', r: 9, fixed: false },
  { id: 'notion',  label: 'Notion',       url: 'https://notion.so',                  cat: 'other', r: 10, fixed: false },
  { id: 'obsidian',label: 'Obsidian',     url: 'https://obsidian.md',                cat: 'other', r: 10, fixed: false },
];

const DEFAULT_EDGES = [
  ['hub','wm'],['hub','og'],['hub','fv'],['hub','wa'],['hub','ig'],['hub','clima'],
  ['wm','og'],['fv','wm'],['wa','ig'],
  ['hub','notion'],['hub','obsidian'],['notion','obsidian'],
];

function loadData() {
  try {
    const raw = localStorage.getItem('jarvis_nodes');
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function saveData() {
  localStorage.setItem('jarvis_nodes', JSON.stringify({ nodes, edges }));
}

function initPositions(nodes) {
  const cx = (window.innerWidth || 800) / 2;
  const cy = (window.innerHeight || 600) / 2;
  nodes.forEach((n, i) => {
    if (!n.x) {
      if (n.id === 'hub') { n.x = cx; n.y = cy; }
      else {
        const angle = (i / (nodes.length - 1)) * Math.PI * 2;
        const radius = 180 + Math.random() * 80;
        n.x = cx + Math.cos(angle) * radius;
        n.y = cy + Math.sin(angle) * radius;
      }
    }
    n.vx = 0; n.vy = 0;
  });
}

let nodes, edges;
const saved = loadData();
if (saved) {
  nodes = saved.nodes;
  edges = saved.edges;
  initPositions(nodes);
} else {
  nodes = DEFAULT_NODES.map(n => ({...n}));
  edges = DEFAULT_EDGES.map(e => [...e]);
  initPositions(nodes);
  saveData();
}

const nodeMap = () => {
  const m = {};
  nodes.forEach(n => m[n.id] = n);
  return m;
};

let mode = 'all';
let hovered = null;
let dragging = null;
let dragOffset = { x: 0, y: 0 };
let t = 0, pulseT = 0;

function isVisible(n) {
  if (mode === 'all') return true;
  if (n.cat === 'hub') return true;
  return n.cat === mode;
}

function hexRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function applyForces() {
  const nm = nodeMap();
  nodes.forEach(a => {
    if (a.id === 'hub' || a.fixed) return;
    nodes.forEach(b => {
      if (a.id === b.id) return;
      const dx = a.x - b.x, dy = a.y - b.y;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;
      const force = 3000 / (dist * dist);
      a.vx += (dx/dist) * force * 0.01;
      a.vy += (dy/dist) * force * 0.01;
    });
    const cx = W/2, cy = H/2;
    a.vx += (cx - a.x) * 0.001;
    a.vy += (cy - a.y) * 0.001;
    a.vx *= 0.88; a.vy *= 0.88;
    a.x += a.vx; a.y += a.vy;
    a.x = Math.max(50, Math.min(W-50, a.x));
    a.y = Math.max(60, Math.min(H-100, a.y));
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#080b12';
  ctx.fillRect(0, 0, W, H);

  for (let gx = 0; gx < W; gx += 44) {
    ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H);
    ctx.strokeStyle = 'rgba(30,70,140,0.07)'; ctx.lineWidth = 0.5; ctx.stroke();
  }
  for (let gy = 0; gy < H; gy += 44) {
    ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy);
    ctx.strokeStyle = 'rgba(30,70,140,0.07)'; ctx.lineWidth = 0.5; ctx.stroke();
  }

  const nm = nodeMap();

  edges.forEach(([a, b], i) => {
    const na = nm[a], nb = nm[b];
    if (!na || !nb) return;
    const vis = (isVisible(na) && isVisible(nb)) ? 1 : 0.04;
    const rgb = hexRgb(CATS[na.cat]?.color || '#888');
    ctx.beginPath();
    ctx.moveTo(na.x, na.y); ctx.lineTo(nb.x, nb.y);
    ctx.strokeStyle = `rgba(${rgb},${0.2 * vis})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();

    if (vis > 0.5) {
      const prog = ((t * 0.35 + i * 41) % 100) / 100;
      const px = na.x + (nb.x - na.x) * prog;
      const py = na.y + (nb.y - na.y) * prog;
      ctx.beginPath();
      ctx.arc(px, py, 2, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${rgb},0.75)`;
      ctx.fill();
    }
  });

  nodes.forEach(n => {
    const cat = CATS[n.cat] || CATS.other;
    const rgb = hexRgb(cat.color);
    const vis = isVisible(n) ? 1 : 0.07;
    const isHub = n.cat === 'hub';
    const isHov = hovered === n.id;

    const glowR = isHub ? n.r * 4.5 : (isHov ? n.r * 4 : n.r * 3);
    const glowA = isHub ? 0.16 + 0.07 * Math.sin(pulseT*2) : (isHov ? 0.18 : 0.1);
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glowR);
    grad.addColorStop(0, `rgba(${rgb},${glowA * vis})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(n.x, n.y, glowR, 0, Math.PI*2); ctx.fill();

    if (isHub) {
      [n.r*1.9, n.r*2.8, n.r*3.7].forEach((rr, i) => {
        ctx.beginPath();
        ctx.arc(n.x, n.y, rr + Math.sin(pulseT + i*1.1)*2, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(${rgb},${(0.22 - i*0.06)*vis})`;
        ctx.lineWidth = 0.5; ctx.stroke();
      });
    }

    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r * (isHov ? 1.25 : 1), 0, Math.PI*2);
    ctx.fillStyle = `rgba(${rgb},${vis * (isHub ? 0.88 : 0.72)})`;
    ctx.fill();
    ctx.strokeStyle = `rgba(${rgb},${vis})`;
    ctx.lineWidth = isHub ? 1.5 : 0.8;
    ctx.stroke();

    if (n.r >= 8 && vis > 0.3) {
      ctx.font = `${n.r >= 11 ? 500 : 400} ${n.r >= 11 ? 11 : 10}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillStyle = `rgba(255,255,255,${vis * 0.82})`;
      ctx.fillText(n.label, n.x, n.y + n.r + 15);
    }
  });

  applyForces();
  t += 0.35; pulseT += 0.04;

  const nm2 = nodeMap();
  document.getElementById('s-nodes').textContent = `NODES: ${nodes.length}`;
  document.getElementById('s-conn').textContent  = `LINKS: ${edges.length}`;
  document.getElementById('s-mode').textContent  = `MODO: ${mode === 'all' ? 'TODOS' : (CATS[mode]?.label || mode).toUpperCase()}`;
  document.getElementById('s-time').textContent  = new Date().toTimeString().slice(0,8);

  requestAnimationFrame(draw);
}

function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function getNodeAt(pos) {
  return nodes.find(n => {
    const dx = n.x - pos.x, dy = n.y - pos.y;
    return Math.sqrt(dx*dx+dy*dy) < n.r + 12;
  });
}

canvas.addEventListener('mousemove', e => {
  const pos = getMousePos(e);
  if (dragging) {
    dragging.x = pos.x - dragOffset.x;
    dragging.y = pos.y - dragOffset.y;
    return;
  }
  const n = getNodeAt(pos);
  hovered = n ? n.id : null;
  canvas.style.cursor = hovered ? 'pointer' : 'default';

  const info = document.getElementById('node-info');
  if (n) {
    document.getElementById('ni-name').textContent = n.label;
    document.getElementById('ni-cat').textContent = CATS[n.cat]?.label || n.cat;
    info.style.display = 'block';
    info.style.left = (e.clientX + 16) + 'px';
    info.style.top  = (e.clientY - 10) + 'px';
  } else {
    info.style.display = 'none';
  }
});

canvas.addEventListener('mousedown', e => {
  const pos = getMousePos(e);
  const n = getNodeAt(pos);
  if (n) { dragging = n; dragOffset = { x: pos.x - n.x, y: pos.y - n.y }; }
});

canvas.addEventListener('mouseup', e => {
  if (dragging) { saveData(); dragging = null; }
});

canvas.addEventListener('click', e => {
  if (!dragging) {
    const pos = getMousePos(e);
    const n = getNodeAt(pos);
    if (n && n.url) window.open(n.url, '_blank');
  }
});

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function openModal() {
  const sel = document.getElementById('f-conn');
  sel.innerHTML = '';
  nodes.forEach(n => {
    const o = document.createElement('option');
    o.value = n.id; o.textContent = n.label;
    if (n.id === 'hub') o.selected = true;
    sel.appendChild(o);
  });
  document.getElementById('f-name').value = '';
  document.getElementById('f-url').value = '';
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

function saveNode() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const cat  = document.getElementById('f-cat').value;
  const url  = document.getElementById('f-url').value.trim();
  const conn = document.getElementById('f-conn').value;

  const id = 'n_' + Date.now();
  const cx = W/2, cy = H/2;
  const angle = Math.random() * Math.PI * 2;
  const radius = 160 + Math.random() * 120;

  nodes.push({
    id, label: name, url, cat,
    r: 9, fixed: false,
    x: cx + Math.cos(angle)*radius,
    y: cy + Math.sin(angle)*radius,
    vx: 0, vy: 0,
  });

  if (conn) edges.push([conn, id]);
  saveData();
  closeModal();
  showToast(`"${name}" agregado a la red`);
}

function resetNodes() {
  if (!confirm('¿Resetear la red a los nodos originales?')) return;
  localStorage.removeItem('jarvis_nodes');
  nodes = DEFAULT_NODES.map(n => ({...n}));
  edges = DEFAULT_EDGES.map(e => [...e]);
  initPositions(nodes);
  saveData();
  showToast('Red reseteada');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) closeModal();
});

draw();
</script>
</body>
</html>
